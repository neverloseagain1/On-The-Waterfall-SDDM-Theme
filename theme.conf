[General]
# Основной цвет текста - блеклый цвет тумана у водопада
ColorLight="#D2D7DF"

# Цвет заблюренной панели и полей - глубокий темно-серый (цвет мокрых скал)
ColorDark="#1B1E22"

# Акцентный цвет - серо-зеленый оттенок травы со скал (для фокуса полей ввода)
ColorAccent="#5C6F65"

# Фон полей ввода - очень темный, почти черный, с легким синеватым отливом воды
ColorInputBg="#0E1113"

